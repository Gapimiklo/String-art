<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Driven Intelligent Color String Studio</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-top: 0; margin-bottom: 5px; }
        p { color: #94a3b8; margin-top: 0; margin-bottom: 20px; text-align: center; max-width: 600px;}
        
        .dashboard {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            align-items: flex-start;
        }
        
        .sidebar {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .section {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .section h3 { margin: 0; font-size: 13px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px;}
        
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #cbd5e1;
        }
        
        input[type="number"], input[type="range"] {
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px;
            box-sizing: border-box;
            width: 100%;
        }
        
        .file-lbl {
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            display: block;
        }
        .file-lbl:hover { background: var(--accent-hover); }
        input[type="file"] { display: none; }
        
        #generateBtn {
            background: var(--success);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
        }
        #generateBtn:hover { background: #059669; }
        #generateBtn:disabled { background: var(--border); color: #64748b; cursor: not-allowed; }
        
        .workspaces {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            flex-grow: 1;
        }
        
        .canvas-card {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .canvas-container {
            width: 450px;
            height: 450px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        
        canvas {
            width: 100%;
            height: 100%;
        }
        
        .status-text {
            margin-top: 15px;
            font-family: monospace;
            color: #3b82f6;
            font-weight: bold;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            height: 140px;
            margin-top: 10px;
            background: #0f172a;
            color: #10b981;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>AI-Driven Intelligent Color String Studio</h1>
    <p>The AI scans all color profiles dynamically, picking only the specific colors needed to mathematically maximize detail.</p>

    <div class="dashboard">
        <div class="sidebar">
            <label class="file-lbl">
                Load Target Image
                <input type="file" id="imageUpload" accept="image/*">
            </label>

            <div class="section">
                <h3>Image Tuning</h3>
                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Contrast</label>
                        <input type="range" id="contrast" min="-100" max="100" value="50">
                    </div>
                    <div class="input-group">
                        <label>Brightness</label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Loom Setup</h3>
                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Pins (Max 500)</label>
                        <input type="number" id="numPins" value="240" min="100" max="500">
                    </div>
                    <div class="input-group">
                        <label>Min Pin Jump</label>
                        <input type="number" id="minDistance" value="25" min="5" max="100">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Limits & Weights</h3>
                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Total Line Limit</label>
                        <input type="number" id="maxLines" value="3000" min="500" max="8000">
                    </div>
                    <div class="input-group">
                        <label>Thread Weight</label>
                        <input type="number" id="lineWeight" value="18" min="1" max="50">
                    </div>
                </div>
            </div>

            <button id="generateBtn" disabled>Compute Intelligent Paths</button>
        </div>

        <div class="workspaces">
            <div class="canvas-card">
                <h3 style="margin: 0 0 10px 0; color: #94a3b8;">Filtered RGB Reference</h3>
                <div class="canvas-container">
                    <canvas id="sourceCanvas" width="800" height="800"></canvas>
                </div>
            </div>

            <div class="canvas-card">
                <h3 style="margin: 0 0 10px 0; color: #94a3b8;">Interactive Preview</h3>
                <div class="canvas-container">
                    <canvas id="artCanvas" width="800" height="800"></canvas>
                </div>
                <div id="status" class="status-text">Upload an image to unlock generation.</div>
                <textarea id="sequenceOutput" placeholder="The AI will dictate real-time color changes step-by-step here..." readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const SIZE = 800; 

        const imageUpload = document.getElementById('imageUpload');
        const generateBtn = document.getElementById('generateBtn');
        const contrastSlider = document.getElementById('contrast');
        const brightnessSlider = document.getElementById('brightness');
        const numPinsInput = document.getElementById('numPins');
        const minDistanceInput = document.getElementById('minDistance');
        const lineWeightInput = document.getElementById('lineWeight');
        const maxLinesInput = document.getElementById('maxLines');

        const sourceCanvas = document.getElementById('sourceCanvas');
        const artCanvas = document.getElementById('artCanvas');
        const sequenceOutput = document.getElementById('sequenceOutput');
        const statusText = document.getElementById('status');

        const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
        const artCtx = artCanvas.getContext('2d');

        let pins = [];
        let uploadedImage = null;
        let isGenerating = false;
        let rDeficit = null, gDeficit = null, bDeficit = null;
        let rBackup = null, gBackup = null, bBackup = null;
        let animationId = null;

        // Subtractive Palette (Which color channels does each string absorb?)
        const AVAILABLE_COLORS = [
            { name: "BLACK",   color: "rgba(15,23,42,0.25)",    channels: ['r', 'g', 'b'] },
            { name: "RED",     color: "rgba(239,68,68,0.3)",    channels: ['g', 'b'] },
            { name: "GREEN",   color: "rgba(34,197,94,0.3)",    channels: ['r', 'b'] },
            { name: "BLUE",    color: "rgba(59,130,246,0.3)",   channels: ['r', 'g'] },
            { name: "YELLOW",  color: "rgba(234,179,8,0.3)",    channels: ['b'] },
            { name: "CYAN",    color: "rgba(6,182,212,0.3)",    channels: ['r'] },
            { name: "MAGENTA", color: "rgba(217,70,239,0.3)",   channels: ['g'] }
        ];

        function getLinePixels(p1, p2) {
            let pixels = [];
            let x0 = Math.round(p1.x), y0 = Math.round(p1.y);
            let x1 = Math.round(p2.x), y1 = Math.round(p2.y);
            let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            let dy = Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = (dx > dy ? dx : -dy) / 2;

            while (true) {
                if (x0 >= 0 && x0 < SIZE && y0 >= 0 && y0 < SIZE) {
                    pixels.push(y0 * SIZE + x0);
                }
                if (x0 === x1 && y0 === y1) break;
                let e2 = err;
                if (e2 > -dx) { err -= dy; x0 += sx; }
                if (e2 < dy) { err += dx; y0 += sy; }
            }
            return pixels;
        }

        function updatePins(count) {
            pins = [];
            const center = SIZE / 2;
            const radius = SIZE / 2 - 4;
            for (let i = 0; i < count; i++) {
                const angle = (i * 2 * Math.PI) / count;
                pins.push({
                    x: center + radius * Math.cos(angle),
                    y: center + radius * Math.sin(angle)
                });
            }
        }

        function processSourceImage() {
            if (!uploadedImage) return;

            sourceCtx.fillStyle = "#ffffff";
            sourceCtx.fillRect(0, 0, SIZE, SIZE);

            const scale = Math.max(SIZE / uploadedImage.width, SIZE / uploadedImage.height);
            const x = (SIZE / 2) - (uploadedImage.width / 2) * scale;
            const y = (SIZE / 2) - (uploadedImage.height / 2) * scale;

            sourceCtx.save();
            sourceCtx.beginPath();
            sourceCtx.arc(SIZE/2, SIZE/2, SIZE/2 - 2, 0, Math.PI * 2);
            sourceCtx.clip();
            sourceCtx.drawImage(uploadedImage, x, y, uploadedImage.width * scale, uploadedImage.height * scale);
            sourceCtx.restore();

            const imgData = sourceCtx.getImageData(0, 0, SIZE, SIZE);
            const d = imgData.data;

            const contrast = parseInt(contrastSlider.value);
            const brightness = parseInt(brightnessSlider.value);
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

            rDeficit = new Float32Array(SIZE * SIZE);
            gDeficit = new Float32Array(SIZE * SIZE);
            bDeficit = new Float32Array(SIZE * SIZE);

            for (let i = 0; i < d.length; i += 4) {
                let r = factor * (d[i] - 128) + 128 + brightness;
                let g = factor * (d[i+1] - 128) + 128 + brightness;
                let b = factor * (d[i+2] - 128) + 128 + brightness;

                d[i] = Math.min(255, Math.max(0, r));
                d[i+1] = Math.min(255, Math.max(0, g));
                d[i+2] = Math.min(255, Math.max(0, b));

                rDeficit[i / 4] = 255 - d[i];
                gDeficit[i / 4] = 255 - d[i+1];
                bDeficit[i / 4] = 255 - d[i+2];
            }
            sourceCtx.putImageData(imgData, 0, 0);
            
            rBackup = new Float32Array(rDeficit);
            gBackup = new Float32Array(gDeficit);
            bBackup = new Float32Array(bDeficit);

            generateBtn.disabled = false;
            statusText.innerText = "Target parsed. Click below to begin AI analysis.";
        }

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const imgUrl = URL.createObjectURL(file);
            uploadedImage = new Image();
            uploadedImage.crossOrigin = "anonymous";
            uploadedImage.onload = () => {
                processSourceImage();
                URL.revokeObjectURL(imgUrl);
            };
            uploadedImage.src = imgUrl;
        });

        contrastSlider.addEventListener('input', processSourceImage);
        brightnessSlider.addEventListener('input', processSourceImage);

        generateBtn.addEventListener('click', () => {
            if (isGenerating) {
                cancelAnimationFrame(animationId);
                isGenerating = false;
                generateBtn.innerText = "Compute Intelligent Paths";
                statusText.innerText = "Interrupted.";
                return;
            }

            const numPins = parseInt(numPinsInput.value);
            const minJump = parseInt(minDistanceInput.value);
            const weight = parseInt(lineWeightInput.value);
            const maxLines = parseInt(maxLinesInput.value);

            updatePins(numPins);

            rDeficit = new Float32Array(rBackup);
            gDeficit = new Float32Array(gBackup);
            bDeficit = new Float32Array(bBackup);

            artCtx.fillStyle = "#ffffff";
            artCtx.fillRect(0, 0, SIZE, SIZE);

            isGenerating = true;
            generateBtn.innerText = "Stop Processing";
            sequenceOutput.value = "=== DYNAMIC AI WEAVING MAP ===\n\n";

            let currentLine = 0;
            let currentPin = 0;
            let lastColorName = "";
            
            // Log keeping track of color choices used
            const colorStats = {};
            AVAILABLE_COLORS.forEach(c => colorStats[c.name] = 0);

            function executeIntelligentWeave() {
                const startTime = performance.now();

                while (performance.now() - startTime < 16 && currentLine < maxLines) {
                    let bestScore = -1;
                    let bestPin = -1;
                    let bestColor = null;
                    let bestPixels = [];

                    // 1. Scan every pin outside of the jump threshold
                    for (let i = 0; i < numPins; i++) {
                        let distance = Math.abs(i - currentPin);
                        if (distance < minJump || distance > numPins - minJump) continue;

                        let pixels = getLinePixels(pins[currentPin], pins[i]);
                        if (pixels.length === 0) continue;

                        // 2. Scan every available thread pigment profile for this specific line
                        for (let colorObj of AVAILABLE_COLORS) {
                            let score = 0;
                            
                            for (let idx of pixels) {
                                if (colorObj.channels.includes('r')) score += rDeficit[idx];
                                if (colorObj.channels.includes('g')) score += gDeficit[idx];
                                if (colorObj.channels.includes('b')) score += bDeficit[idx];
                            }
                            score /= pixels.length;

                            // We check if this structural modification beats previous options
                            if (score > bestScore) {
                                bestScore = score;
                                bestPin = i;
                                bestColor = colorObj;
                                bestPixels = pixels;
                            }
                        }
                    }

                    if (bestPin === -1 || bestScore <= 1) {
                        // Stop early if adding threads no longer improves accuracy
                        statusText.innerText = "Target optimal threshold reached.";
                        isGenerating = false;
                        break;
                    }

                    // 3. Deduct selected pigment values from channel deficits
                    for (let idx of bestPixels) {
                        if (bestColor.channels.includes('r')) rDeficit[idx] = Math.max(0, rDeficit[idx] - weight);
                        if (bestColor.channels.includes('g')) gDeficit[idx] = Math.max(0, gDeficit[idx] - weight);
                        if (bestColor.channels.includes('b')) bDeficit[idx] = Math.max(0, bDeficit[idx] - weight);
                    }

                    // 4. Print instructions on color swap adjustments
                    if (bestColor.name !== lastColorName) {
                        sequenceOutput.value += `\n[SWITCH TO ${bestColor.name}] -> Move to Peg ${currentPin}`;
                        lastColorName = bestColor.name;
                    }
                    sequenceOutput.value += ` -> ${bestPin}`;
                    
                    colorStats[bestColor.name]++;

                    // 5. Draw line onto visualization layer
                    artCtx.beginPath();
                    artCtx.moveTo(pins[currentPin].x, pins[currentPin].y);
                    artCtx.lineTo(pins[bestPin].x, pins[bestPin].y);
                    artCtx.strokeStyle = bestColor.color;
                    artCtx.lineWidth = 0.5;
                    artCtx.stroke();

                    currentPin = bestPin;
                    currentLine++;
                }

                // Format live telemetry summaries
                let metricsStr = Object.entries(colorStats)
                    .filter(([_, val]) => val > 0)
                    .map(([name, val]) => `${name}: ${val}`)
                    .join(" | ");

                statusText.innerText = `Line ${currentLine}/${maxLines} (${metricsStr})`;
                sequenceOutput.scrollTop = sequenceOutput.scrollHeight;

                if (currentLine >= maxLines) {
                    statusText.innerText = "Processing Complete! Review thread sequence below.";
                    generateBtn.innerText = "Compute Intelligent Paths";
                    isGenerating = false;
                }

                if (isGenerating) {
                    animationId = requestAnimationFrame(executeIntelligentWeave);
                }
            }

            animationId = requestAnimationFrame(executeIntelligentWeave);
        });
    </script>
</body>
</html>
